<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>商品管理后台</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --primary: #2563eb;
  --primary-dark: #1d4ed8;
  --bg: #f8fafc;
  --card: #ffffff;
  --text: #1e293b;
  --text-light: #64748b;
  --border: #e2e8f0;
  --success: #10b981;
  --danger: #ef4444;
  --warning: #f59e0b;
}
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body {
  font-family: 'Noto Sans SC', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: 16px;
  line-height: 1.6;
}
.header {
  background: linear-gradient(135deg, var(--primary) 0%, #7c3aed 100%);
  color: white; padding: 24px 20px; margin: -16px -16px 20px -16px;
  display: flex; align-items: center; justify-content: space-between;
}
.header h1 { font-size: 20px; font-weight: 700; }
.header a { color: white; text-decoration: none; font-size: 14px; background: rgba(255,255,255,0.2); padding: 8px 16px; border-radius: 8px; }
.add-btn {
  display: flex; align-items: center; justify-content: center; gap: 8px;
  width: 100%; padding: 14px; background: var(--card); border: 2px dashed var(--primary);
  border-radius: 12px; color: var(--primary); font-size: 15px; font-weight: 600;
  cursor: pointer; margin-bottom: 16px; transition: all 0.2s;
}
.add-btn:active { background: #f0f9ff; }
.products-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
.product-card {
  background: var(--card); border-radius: 16px; overflow: hidden;
  box-shadow: 0 2px 8px rgba(0,0,0,0.04); cursor: pointer; transition: all 0.2s;
}
.product-card:active { transform: scale(0.98); }
.product-img {
  width: 100%; aspect-ratio: 1; background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
  display: flex; align-items: center; justify-content: center; color: var(--primary); font-size: 40px;
}
.product-info { padding: 12px; }
.product-title {
  font-size: 14px; font-weight: 500; margin-bottom: 6px;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}
.product-price { font-size: 16px; font-weight: 700; color: var(--danger); }
.product-price::before { content: '¥'; font-size: 12px; }
.product-sales { font-size: 11px; color: var(--text-light); margin-top: 4px; }
/* 编辑弹窗 */
.modal {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.5); display: none; align-items: flex-end;
  justify-content: center; z-index: 3000;
}
.modal.show { display: flex; }
.modal-content {
  background: var(--card); width: 100%; max-height: 90vh; border-radius: 20px 20px 0 0;
  padding: 24px; animation: slideUp 0.3s ease; overflow-y: auto;
}
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
.modal-title { text-align: center; font-size: 18px; margin-bottom: 20px; font-weight: 600; }
.form-group { margin-bottom: 16px; }
.form-group label {
  display: block; font-size: 13px; color: var(--text-light); margin-bottom: 8px;
}
.form-group input, .form-group textarea, .form-group select {
  width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 10px;
  font-size: 14px; outline: none; font-family: inherit; background: white;
}
.form-group textarea { resize: none; }
.form-row { display: flex; gap: 12px; }
.form-row .form-group { flex: 1; }
.btn-group { display: flex; gap: 12px; margin-top: 20px; }
.btn {
  flex: 1; padding: 14px; border-radius: 12px; font-size: 15px; font-weight: 600;
  cursor: pointer; border: none; transition: all 0.2s;
}
.btn-primary { background: var(--primary); color: white; }
.btn-danger { background: white; color: var(--danger); border: 1px solid var(--danger); }
.btn-cancel { background: white; color: var(--text-light); border: 1px solid var(--border); }
.empty {
  text-align: center; padding: 60px 20px; color: var(--text-light);
}
.empty-icon { font-size: 60px; margin-bottom: 16px; }
.toast {
  position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
  background: rgba(0,0,0,0.75); color: white; padding: 12px 24px;
  border-radius: 8px; font-size: 14px; z-index: 9999; opacity: 0;
  pointer-events: none; transition: opacity 0.3s;
}
.toast.show { opacity: 1; }
</style>
</head>
<body>

<div class="header">
  <h1>🛠️ 商品管理</h1>
  <a href="user.html">👁️ 查看用户端</a>
</div>

<button class="add-btn" onclick="openForm()">
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
    <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
  </svg>
  添加新商品
</button>

<div class="products-grid" id="grid"></div>
<div class="empty" id="empty" style="display:none;">
  <div class="empty-icon">📦</div>
  <div>暂无商品</div>
  <div style="font-size:13px;margin-top:8px;">点击上方按钮添加第一个商品</div>
</div>

<!-- 编辑弹窗 -->
<div class="modal" id="modal">
  <div class="modal-content">
    <div class="modal-title" id="formTitle">添加商品</div>
    <div class="form-group">
      <label>商品名称</label>
      <input type="text" id="pTitle" placeholder="例：2026考研数学复习全书">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>价格（元）</label>
        <input type="number" id="pPrice" placeholder="29.9" step="0.1">
      </div>
      <div class="form-group">
        <label>销量</label>
        <input type="number" id="pSales" placeholder="0">
      </div>
    </div>
    <div class="form-group">
      <label>商品图标（emoji）</label>
      <input type="text" id="pImg" placeholder="📐">
    </div>
    <div class="form-group">
      <label>发货图片URL（购买后发送的图片）</label>
      <input type="text" id="pFileUrl" placeholder="https://example.com/image.jpg">
    </div>
    <div class="form-group">
      <label>商品描述</label>
      <textarea id="pDesc" rows="3" placeholder="描述商品特点..."></textarea>
    </div>
    <div class="btn-group">
      <button class="btn btn-danger" id="delBtn" onclick="deleteProduct()" style="display:none;">删除</button>
      <button class="btn btn-cancel" onclick="closeForm()">取消</button>
      <button class="btn btn-primary" onclick="saveProduct()">保存</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// 数据
const defaultProducts = [
  { id: 1, title: '2026考研数学复习全书', price: 29.9, sales: 1523, img: '📐', desc: '包含高数、线代、概率论全部内容，配套视频讲解', fileUrl: '' },
  { id: 2, title: '考研英语词汇5500', price: 9.9, sales: 2341, img: '📖', desc: '考研英语大纲词汇，附带真题例句和记忆技巧', fileUrl: '' },
  { id: 3, title: '考研政治核心考点', price: 19.9, sales: 1892, img: '📕', desc: '马原、毛概、史纲、思修核心知识点总结', fileUrl: '' },
  { id: 4, title: '考研数学历年真题', price: 39.9, sales: 892, img: '📝', desc: '近20年考研数学真题及详细解析', fileUrl: '' },
  { id: 5, title: '考研英语真题精解', price: 35.9, sales: 1023, img: '📋', desc: '近15年英语真题逐句精解，阅读技巧全攻略', fileUrl: '' },
  { id: 6, title: '计算机408专业课资料', price: 49.9, sales: 567, img: '💻', desc: '数据结构、操作系统、计网、组成原理全套', fileUrl: '' },
];

let products = JSON.parse(localStorage.getItem('products')) || defaultProducts;
let editingId = null;

// 渲染
function render() {
  const grid = document.getElementById('grid');
  const empty = document.getElementById('empty');
  
  if (products.length === 0) {
    grid.style.display = 'none';
    empty.style.display = 'block';
    return;
  }
  
  grid.style.display = 'grid';
  empty.style.display = 'none';
  
  grid.innerHTML = products.map(p => `
    <div class="product-card" onclick="openForm(${p.id})">
      <div class="product-img">${p.img}</div>
      <div class="product-info">
        <div class="product-title">${p.title}</div>
        <div class="product-price">${p.price}</div>
        <div class="product-sales">已售 ${p.sales}</div>
      </div>
    </div>
  `).join('');
}

// 打开表单
function openForm(id) {
  editingId = id;
  const modal = document.getElementById('modal');
  const title = document.getElementById('formTitle');
  const delBtn = document.getElementById('delBtn');
  
  if (id) {
    const p = products.find(x => x.id === id);
    if (!p) return;
    title.textContent = '编辑商品';
    document.getElementById('pTitle').value = p.title;
    document.getElementById('pPrice').value = p.price;
    document.getElementById('pSales').value = p.sales;
    document.getElementById('pImg').value = p.img;
    document.getElementById('pFileUrl').value = p.fileUrl || '';
    document.getElementById('pDesc').value = p.desc;
    delBtn.style.display = 'block';
  } else {
    title.textContent = '添加商品';
    document.getElementById('pTitle').value = '';
    document.getElementById('pPrice').value = '';
    document.getElementById('pSales').value = '0';
    document.getElementById('pImg').value = '📄';
    document.getElementById('pFileUrl').value = '';
    document.getElementById('pDesc').value = '';
    delBtn.style.display = 'none';
  }
  
  modal.classList.add('show');
}

function closeForm() {
  document.getElementById('modal').classList.remove('show');
  editingId = null;
}

// 保存
function saveProduct() {
  const title = document.getElementById('pTitle').value.trim();
  const price = parseFloat(document.getElementById('pPrice').value);
  const sales = parseInt(document.getElementById('pSales').value) || 0;
  const img = document.getElementById('pImg').value.trim() || '📄';
  const fileUrl = document.getElementById('pFileUrl').value.trim();
  const desc = document.getElementById('pDesc').value.trim();
  
  if (!title || isNaN(price)) {
    showToast('请填写名称和价格');
    return;
  }
  
  if (editingId) {
    const p = products.find(x => x.id === editingId);
    if (p) {
      p.title = title;
      p.price = price;
      p.sales = sales;
      p.img = img;
      p.fileUrl = fileUrl;
      p.desc = desc;
    }
    showToast('已更新');
  } else {
    products.push({ id: Date.now(), title, price, sales, img, fileUrl, desc });
    showToast('已添加');
  }
  
  localStorage.setItem('products', JSON.stringify(products));
  closeForm();
  render();
}

// 删除
function deleteProduct() {
  if (!editingId) return;
  if (!confirm('确定删除这个商品？')) return;
  products = products.filter(x => x.id !== editingId);
  localStorage.setItem('products', JSON.stringify(products));
  closeForm();
  render();
  showToast('已删除');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

document.getElementById('modal').addEventListener('click', function(e) {
  if (e.target === this) closeForm();
});

render();
</script>
</body>
</html>
