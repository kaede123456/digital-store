<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>商品管理后台</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Inter', -apple-system, sans-serif; background: #f0f2f5; color: #1a1a1a; min-height: 100vh; }
.top-nav { background: #fff; padding: 0 24px; height: 60px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #e5e7eb; position: sticky; top: 0; z-index: 100; }
.top-nav h1 { font-size: 18px; font-weight: 600; }
.top-nav a { color: #666; text-decoration: none; font-size: 14px; padding: 8px 16px; border-radius: 6px; background: #f5f5f5; }
.main { max-width: 1200px; margin: 0 auto; padding: 24px; }
.stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
.stat-card { background: #fff; border-radius: 12px; padding: 20px; display: flex; align-items: center; gap: 16px; }
.stat-icon { width: 48px; height: 48px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 24px; }
.stat-icon.orange { background: #fff7e6; }
.stat-icon.green { background: #e6f7ff; }
.stat-icon.blue { background: #f0f5ff; }
.stat-info .num { font-size: 24px; font-weight: 700; }
.stat-info .label { font-size: 13px; color: #999; margin-top: 2px; }
.toolbar { background: #fff; border-radius: 12px; padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; flex-wrap: wrap; gap: 12px; }
.search-box { display: flex; align-items: center; gap: 8px; background: #f5f7fa; padding: 8px 14px; border-radius: 8px; }
.search-box input { border: none; outline: none; background: transparent; font-size: 14px; width: 200px; }
.btn-group { display: flex; gap: 10px; }
.btn { padding: 10px 16px; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; border: none; }
.btn-sync { background: #52c41a; color: #fff; }
.btn-sync:hover { background: #3d9e19; }
.btn-add { background: #e54d00; color: #fff; }
.btn-add:hover { background: #d94400; }
.table-box { background: #fff; border-radius: 12px; overflow: hidden; }
table { width: 100%; border-collapse: collapse; }
th, td { padding: 14px 16px; text-align: left; border-bottom: 1px solid #f0f0f0; }
th { background: #fafafa; font-size: 13px; font-weight: 600; color: #666; }
td { font-size: 14px; }
tr:hover { background: #fafafa; }
.product-cell { display: flex; align-items: center; gap: 12px; }
.product-cell img { width: 50px; height: 50px; border-radius: 8px; object-fit: cover; }
.product-cell-info .name { font-weight: 500; margin-bottom: 2px; }
.product-cell-info .desc { font-size: 12px; color: #999; }
.price { font-weight: 600; color: #e54d00; }
.actions { display: flex; gap: 8px; }
.actions button { padding: 6px 12px; border-radius: 6px; font-size: 13px; cursor: pointer; border: none; }
.actions .edit { background: #f0f5ff; color: #2563eb; }
.actions .delete { background: #fff2f0; color: #ff4d4f; }
.modal { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 1000; }
.modal.show { display: flex; }
.form-box { background: #fff; width: 100%; max-width: 560px; border-radius: 16px; padding: 28px; max-height: 90vh; overflow-y: auto; }
.form-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
.form-header h2 { font-size: 18px; font-weight: 600; }
.form-close { width: 32px; height: 32px; border-radius: 50%; background: #f5f5f5; border: none; cursor: pointer; font-size: 18px; }
.form-group { margin-bottom: 16px; }
.form-group label { display: block; font-size: 13px; color: #666; margin-bottom: 6px; font-weight: 500; }
.form-group input, .form-group textarea { width: 100%; padding: 10px 14px; border: 1px solid #e5e7eb; border-radius: 8px; font-size: 14px; outline: none; }
.form-group input:focus { border-color: #e54d00; }
.form-group textarea { resize: vertical; height: 80px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.form-btns { display: flex; gap: 12px; margin-top: 24px; }
.form-btns button { flex: 1; padding: 12px; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; border: none; }
.btn-save { background: #e54d00; color: #fff; }
.btn-cancel { background: #f5f5f5; color: #666; }
.btn-delete { background: #fff; color: #ff4d4f; border: 1px solid #ff4d4f; display: none; }
.toast { position: fixed; top: 24px; left: 50%; transform: translateX(-50%) translateY(-20px); background: #333; color: #fff; padding: 12px 24px; border-radius: 8px; font-size: 14px; z-index: 9999; opacity: 0; pointer-events: none; transition: all 0.3s; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.upload-box { border: 2px dashed #e5e7eb; border-radius: 8px; padding: 20px; text-align: center; cursor: pointer; transition: all 0.2s; background: #fafafa; }
.upload-box:hover { border-color: #e54d00; background: #fff8f5; }
.upload-placeholder { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 10px; }
.loading { position: fixed; inset: 0; background: rgba(255,255,255,0.9); display: none; align-items: center; justify-content: center; z-index: 9998; flex-direction: column; gap: 16px; }
.loading.show { display: flex; }
.loading-spinner { width: 40px; height: 40px; border: 3px solid #f0f0f0; border-top-color: #e54d00; border-radius: 50%; animation: spin 1s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-size: 14px; color: #666; }
@media (max-width: 768px) {
  .main { padding: 16px; }
  .form-row { grid-template-columns: 1fr; }
  .toolbar { flex-direction: column; }
}
</style>
</head>
<body>

<div class="top-nav">
  <h1>🛠️ 商品管理</h1>
  <a href="user.html" target="_blank">👁 查看用户端</a>
</div>

<div class="main">
  <div class="stats">
    <div class="stat-card">
      <div class="stat-icon orange">📦</div>
      <div class="stat-info"><div class="num" id="totalProducts">0</div><div class="label">商品总数</div></div>
    </div>
    <div class="stat-card">
      <div class="stat-icon green">💰</div>
      <div class="stat-info"><div class="num" id="totalSales">0</div><div class="label">总销量</div></div>
    </div>
    <div class="stat-card">
      <div class="stat-icon blue">💬</div>
      <div class="stat-info"><div class="num" id="kfWechatDisplay">未设置</div><div class="label">客服微信</div></div>
    </div>
  </div>

  <div class="toolbar">
    <div class="search-box"><span>🔍</span><input type="text" placeholder="搜索商品..." oninput="renderTable()"></div>
    <div class="btn-group">
      <button class="btn btn-sync" onclick="openKfModal()">💬 客服微信</button>
      <button class="btn btn-sync" onclick="syncToCloud()">☁️ 同步</button>
      <button class="btn btn-add" onclick="openForm()">+ 添加商品</button>
    </div>
  </div>
  
  <!-- 客服微信设置弹窗 -->
  <div class="modal" id="kfModal">
    <div class="form-box" style="max-width:400px;">
      <div class="form-header"><h2>客服设置</h2><button class="form-close" onclick="closeKfModal()">×</button></div>
      <div class="form-group">
        <label>客服微信</label>
        <input type="text" id="kfWechatInput" placeholder="请输入你的微信号">
        <div style="font-size:12px;color:#999;margin-top:4px;">用户付款后将显示此微信</div>
      </div>
      <div class="form-btns">
        <button class="btn-cancel" onclick="closeKfModal()">取消</button>
        <button class="btn-save" onclick="saveKfWechat()">保存并同步</button>
      </div>
    </div>
  </div>

  <div class="table-box">
    <table>
      <thead><tr><th style="width:40%;">商品</th><th>价格</th><th>销量</th><th>操作</th></tr></thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>
</div>

<!-- 编辑弹窗 -->
<div class="modal" id="modal">
  <div class="form-box">
    <div class="form-header"><h2 id="formTitle">添加商品</h2><button class="form-close" onclick="closeForm()">×</button></div>
    <div class="form-group"><label>商品名称</label><input type="text" id="pTitle" placeholder="例：2026考研数学复习全书"></div>
    <div class="form-row">
      <div class="form-group"><label>价格（元）</label><input type="number" id="pPrice" placeholder="29.9" step="0.1"></div>
      <div class="form-group"><label>销量</label><input type="number" id="pSales" placeholder="0"></div>
    </div>
    <div class="form-group">
      <label>商品封面</label>
      <div class="upload-box" onclick="document.getElementById('coverUpload').click()" style="min-height:120px;">
        <img id="coverPreview" src="" style="display:none;max-width:100%;max-height:100px;border-radius:8px;">
        <div id="coverPlaceholder" class="upload-placeholder">
          <span style="font-size:24px;">🖼️</span>
          <span style="font-size:12px;color:#999;margin-top:4px;">点击上传商品封面</span>
        </div>
      </div>
      <input type="file" id="coverUpload" accept="image/*" style="display:none;" onchange="handleCoverUpload(this)">
      <input type="hidden" id="pImg">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>或输入图标emoji</label>
        <input type="text" id="pEmoji" placeholder="📐" style="width:100%;padding:10px;border:1px solid #e5e7eb;border-radius:8px;font-size:14px;">
      </div>
      <div class="form-group">
        <label>商品分类</label>
        <input type="text" id="pCategory" placeholder="如：考研资料" style="width:100%;padding:10px;border:1px solid #e5e7eb;border-radius:8px;font-size:14px;">
      </div>
    </div>
    <div class="form-group">
      <label>微信收款码</label>
        <div class="upload-box" onclick="document.getElementById('wechatUpload').click()">
          <img id="wechatPreview" src="" style="display:none;max-width:100%;border-radius:8px;">
          <div id="wechatPlaceholder" class="upload-placeholder">
            <span style="font-size:24px;">💚</span>
            <span style="font-size:12px;color:#999;margin-top:4px;">点击上传微信收款码</span>
          </div>
        </div>
        <input type="file" id="wechatUpload" accept="image/*" style="display:none;" onchange="handleUpload(this, 'wechatPay')">
        <input type="hidden" id="pWechatPay">
      </div>
      <div class="form-group">
        <label>支付宝收款码</label>
        <div class="upload-box" onclick="document.getElementById('alipayUpload').click()">
          <img id="alipayPreview" src="" style="display:none;max-width:100%;border-radius:8px;">
          <div id="alipayPlaceholder" class="upload-placeholder">
            <span style="font-size:24px;">💙</span>
            <span style="font-size:12px;color:#999;margin-top:4px;">点击上传支付宝收款码</span>
          </div>
        </div>
        <input type="file" id="alipayUpload" accept="image/*" style="display:none;" onchange="handleUpload(this, 'alipay')">
        <input type="hidden" id="pAlipay">
      </div>
    </div>
    <div class="form-group"><label>发货图片URL（购买后发送）</label><input type="text" id="pFileUrl" placeholder="资料下载链接或图片URL"></div>
    <div class="form-group"><label>商品描述</label><textarea id="pDesc" placeholder="描述商品特点..."></textarea></div>
    <div class="form-btns">
      <button class="btn-delete" id="delBtn" onclick="deleteProduct()">删除</button>
      <button class="btn-cancel" onclick="closeForm()">取消</button>
      <button class="btn-save" onclick="saveProduct()">保存并同步</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// GitHub配置
const CONFIG = {
  owner: 'kaede123456',
  repo: 'digital-store',
  branch: 'main'
};

// 云端数据URL
const DATA_URL = `https://raw.githubusercontent.com/${CONFIG.owner}/${CONFIG.repo}/${CONFIG.branch}/data.json`;

let products = [];
let editingId = null;
let cloudData = null;

// 初始化 - 完全基于本地，秒开
function init() {
  products = JSON.parse(localStorage.getItem('products')) || [];
  initKfWechat();
  renderTable();
  updateStats();
}

// 从云端拉取
async function pullFromCloud() {
  showToast('拉取中...');
  try {
    const response = await fetch(DATA_URL + '?t=' + Date.now());
    if (response.ok) {
      const data = await response.json();
      products = data.products || [];
      localStorage.setItem('products', JSON.stringify(products));
      localStorage.setItem('kfWechat', data.kfWechat || '');
      initKfWechat();
      renderTable();
      updateStats();
      showToast('已从云端拉取');
    } else {
      showToast('拉取失败');
    }
  } catch (e) {
    showToast('拉取失败');
  }
}

// 同步到云端
async function syncToCloud() {
  const token = localStorage.getItem('githubToken');
  if (!token) {
    showTokenModal();
    return;
  }
  
  showToast('同步中...');
  
  const data = {
    products: products,
    kfWechat: localStorage.getItem('kfWechat') || '',
    updatedAt: new Date().toISOString()
  };
  
  const content = btoa(unescape(encodeURIComponent(JSON.stringify(data))));
  
  try {
    // 同时获取SHA和上传（并行）
    const shaPromise = fetch(`https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/contents/data.json`, {
      headers: { 'Authorization': 'token ' + token }
    }).then(r => r.ok ? r.json() : null).catch(() => null);
    
    const shaData = await shaPromise;
    
    const bodyData = {
      message: 'Sync',
      content: content
    };
    if (shaData && shaData.sha) bodyData.sha = shaData.sha;
    
    const response = await fetch(`https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/contents/data.json`, {
      method: 'PUT',
      headers: {
        'Authorization': 'token ' + token,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify(bodyData)
    });
    
    if (response.ok) {
      showToast('同步成功！');
    } else {
      showToast('同步失败');
    }
  } catch (e) {
    showToast('同步失败');
  }
}

// 显示Token设置弹窗
function showTokenModal() {
  const token = localStorage.getItem('githubToken') || '';
  const input = prompt('请输入GitHub Personal Access Token（用于同步数据到云端）\n\n获取方式：\n1. 打开 https://github.com/settings/tokens\n2. 点击 "Generate new token (classic)"\n3. 勾选 "repo" 权限\n4. 生成后复制token粘贴到这里\n\n注意：Token只会存储在本地浏览器中', token);
  
  if (input && input.trim()) {
    localStorage.setItem('githubToken', input.trim());
    showToast('Token已保存，请再次点击"同步到云端"');
  }
}

// 图片上传处理
function handleUpload(input, type) {
  const file = input.files[0];
  if (!file) return;
  
  const reader = new FileReader();
  reader.onload = function(e) {
    const dataUrl = e.target.result;
    if (type === 'wechatPay') {
      document.getElementById('pWechatPay').value = dataUrl;
      document.getElementById('wechatPreview').src = dataUrl;
      document.getElementById('wechatPreview').style.display = 'block';
      document.getElementById('wechatPlaceholder').style.display = 'none';
    } else {
      document.getElementById('pAlipay').value = dataUrl;
      document.getElementById('alipayPreview').src = dataUrl;
      document.getElementById('alipayPreview').style.display = 'block';
      document.getElementById('alipayPlaceholder').style.display = 'none';
    }
  };
  reader.readAsDataURL(file);
}

function handleCoverUpload(input) {
  const file = input.files[0];
  if (!file) return;
  
  const reader = new FileReader();
  reader.onload = function(e) {
    document.getElementById('pImg').value = e.target.result;
    document.getElementById('coverPreview').src = e.target.result;
    document.getElementById('coverPreview').style.display = 'block';
    document.getElementById('coverPlaceholder').style.display = 'none';
  };
  reader.readAsDataURL(file);
}

function showPreview(id) {
  const p = products.find(x => x.id === id);
  if (!p) return;
  
  if (p.wechatPay) {
    document.getElementById('pWechatPay').value = p.wechatPay;
    document.getElementById('wechatPreview').src = p.wechatPay;
    document.getElementById('wechatPreview').style.display = 'block';
    document.getElementById('wechatPlaceholder').style.display = 'none';
  }
  
  if (p.alipay) {
    document.getElementById('pAlipay').value = p.alipay;
    document.getElementById('alipayPreview').src = p.alipay;
    document.getElementById('alipayPreview').style.display = 'block';
    document.getElementById('alipayPlaceholder').style.display = 'none';
  }
}

function updateStats() {
  document.getElementById('totalProducts').textContent = products.length;
  document.getElementById('totalSales').textContent = products.reduce((s, p) => s + (p.sales || 0), 0);
}

function renderTable() {
  const search = document.querySelector('.search-box input').value.toLowerCase();
  const filtered = products.filter(p => p.title.toLowerCase().includes(search) || p.desc.toLowerCase().includes(search));
  const tbody = document.getElementById('tableBody');
  
  if (filtered.length === 0) {
    tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;padding:60px;color:#999;">暂无商品，点击上方按钮添加</td></tr>';
    return;
  }
  
  tbody.innerHTML = filtered.map(p => `
    <tr>
      <td><div class="product-cell"><span style="font-size:32px;">${p.img}</span><div class="product-cell-info"><div class="name">${p.title}</div><div class="desc">${(p.desc || '').substring(0,20)}${(p.desc || '').length > 20 ? '...' : ''}</div></div></div></td>
      <td><span class="price">¥${p.price}</span></td>
      <td>${p.sales || 0}</td>
      <td><div class="actions"><button class="edit" onclick="openForm(${p.id})">编辑</button><button class="delete" onclick="confirmDelete(${p.id})">删除</button></div></td>
    </tr>
  `).join('');
}

function openForm(id) {
  editingId = id;
  
  if (id) {
    const p = products.find(x => x.id === id);
    if (!p) return;
    document.getElementById('formTitle').textContent = '编辑商品';
    document.getElementById('pTitle').value = p.title || '';
    document.getElementById('pPrice').value = p.price || '';
    document.getElementById('pSales').value = p.sales || 0;
    document.getElementById('pEmoji').value = p.category || '';
    document.getElementById('pCategory').value = p.category || '';
    document.getElementById('pFileUrl').value = p.fileUrl || '';
    document.getElementById('pDesc').value = p.desc || '';
    document.getElementById('delBtn').style.display = 'block';
    
    // 显示封面
    if (p.img && (p.img.startsWith('data:') || p.img.startsWith('http'))) {
      document.getElementById('pImg').value = p.img;
      document.getElementById('coverPreview').src = p.img;
      document.getElementById('coverPreview').style.display = 'block';
      document.getElementById('coverPlaceholder').style.display = 'none';
    } else {
      document.getElementById('pImg').value = p.img || '📄';
      document.getElementById('coverPreview').style.display = 'none';
      document.getElementById('coverPlaceholder').style.display = 'flex';
    }
    
    showPreview(id);
  } else {
    document.getElementById('formTitle').textContent = '添加商品';
    document.getElementById('pTitle').value = '';
    document.getElementById('pPrice').value = '';
    document.getElementById('pSales').value = '0';
    document.getElementById('pEmoji').value = '📄';
    document.getElementById('pCategory').value = '';
    document.getElementById('pImg').value = '';
    document.getElementById('pFileUrl').value = '';
    document.getElementById('pDesc').value = '';
    document.getElementById('delBtn').style.display = 'none';
    
    // 清空图片预览
    document.getElementById('pWechatPay').value = '';
    document.getElementById('pAlipay').value = '';
    document.getElementById('wechatPreview').style.display = 'none';
    document.getElementById('wechatPlaceholder').style.display = 'flex';
    document.getElementById('alipayPreview').style.display = 'none';
    document.getElementById('alipayPlaceholder').style.display = 'flex';
    document.getElementById('coverPreview').style.display = 'none';
    document.getElementById('coverPlaceholder').style.display = 'flex';
  }
  document.getElementById('modal').classList.add('show');
}

function closeForm() { document.getElementById('modal').classList.remove('show'); editingId = null; }

function saveProduct() {
  const title = document.getElementById('pTitle').value.trim();
  const price = parseFloat(document.getElementById('pPrice').value);
  const sales = parseInt(document.getElementById('pSales').value) || 0;
  const img = document.getElementById('pImg').value || document.getElementById('pEmoji').value.trim() || '📄';
  const category = document.getElementById('pCategory').value.trim();
  const wechatPay = document.getElementById('pWechatPay').value;
  const alipay = document.getElementById('pAlipay').value;
  const fileUrl = document.getElementById('pFileUrl').value.trim();
  const desc = document.getElementById('pDesc').value.trim();
  
  if (!title || isNaN(price)) { showToast('请填写名称和价格'); return; }
  
  if (editingId) {
    const p = products.find(x => x.id === editingId);
    if (p) Object.assign(p, { title, price, sales, img, category, wechatPay, alipay, fileUrl, desc });
    showToast('已更新');
  } else {
    products.push({ id: Date.now(), title, price, sales, img, category, wechatPay, alipay, fileUrl, desc });
    showToast('已添加');
  }
  
  localStorage.setItem('products', JSON.stringify(products));
  closeForm();
  renderTable();
  updateStats();
  
  // 自动同步
  syncToCloud();
}

function confirmDelete(id) { if (!confirm('确定删除？')) return; deleteProductById(id); }
function deleteProductById(id) { 
  products = products.filter(x => x.id !== id); 
  localStorage.setItem('products', JSON.stringify(products)); 
  renderTable(); 
  updateStats();
  showToast('已删除');
  syncToCloud();
}
function deleteProduct() { if (editingId) deleteProductById(editingId); closeForm(); }

function initKfWechat() {
  const kf = localStorage.getItem('kfWechat') || '';
  const display = document.getElementById('kfWechatDisplay');
  if (display) display.textContent = kf || '未设置';
}

function closeKfModal() { document.getElementById('kfModal').classList.remove('show'); }

function openKfModal() {
  document.getElementById('kfWechatInput').value = localStorage.getItem('kfWechat') || '';
  document.getElementById('kfModal').classList.add('show');
}

function saveKfWechat() {
  const wechat = document.getElementById('kfWechatInput').value.trim();
  localStorage.setItem('kfWechat', wechat);
  initKfWechat();
  closeKfModal();
  syncToCloud();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

document.getElementById('modal').addEventListener('click', e => { if (e.target === document.getElementById('modal')) closeForm(); });
document.getElementById('kfModal').addEventListener('click', e => { if (e.target === document.getElementById('kfModal')) closeKfModal(); });

init();
</script>
</body>
