<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>商品管理</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#f5f5f5;color:#1a1a1a;min-height:100vh}
.header{background:#fff;padding:16px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #eee}
.header h1{font-size:18px;font-weight:600}
.header a{color:#666;font-size:14px;padding:8px 16px;background:#f5f5f5;border-radius:6px;text-decoration:none}
.main{padding:16px;max-width:800px;margin:0 auto}
.toolbar{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.toolbar input{flex:1;min-width:150px;padding:10px 14px;border:1px solid #ddd;border-radius:8px;font-size:14px}
.toolbar button{padding:10px 16px;border:none;border-radius:8px;font-size:14px;cursor:pointer}
.btn-sync{background:#52c41a;color:#fff}
.btn-add{background:#e54d00;color:#fff}
.btn-kf{background:#1890ff;color:#fff}
.products{display:flex;flex-direction:column;gap:12px}
.product{background:#fff;border-radius:12px;padding:16px;display:flex;gap:12px;cursor:pointer}
.product:active{opacity:0.8}
.product-img{width:60px;height:60px;background:#fafafa;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:28px;flex-shrink:0}
.product-info{flex:1;min-width:0}
.product-title{font-size:15px;font-weight:500;margin-bottom:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.product-desc{font-size:12px;color:#999;margin-bottom:8px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.product-bottom{display:flex;align-items:center;gap:12px}
.product-price{font-size:16px;font-weight:600;color:#e54d00}
.product-sales{font-size:12px;color:#999}
.product-actions{display:flex;gap:8px}
.product-actions button{padding:6px 12px;border:none;border-radius:6px;font-size:13px;cursor:pointer}
.edit-btn{background:#f0f5ff;color:#2563eb}
.delete-btn{background:#fff2f0;color:#ff4d4f}
.empty{text-align:center;padding:60px;color:#999}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;z-index:1000}
.modal.show{display:flex}
.form-box{background:#fff;width:90%;max-width:400px;border-radius:16px;padding:24px;max-height:90vh;overflow-y:auto}
.form-box h2{font-size:17px;margin-bottom:16px;text-align:center}
.form-group{margin-bottom:12px}
.form-group label{display:block;font-size:13px;color:#666;margin-bottom:4px}
.form-group input,.form-group textarea{width:100%;padding:10px;border:1px solid #ddd;border-radius:8px;font-size:14px}
.form-group textarea{resize:none;height:60px}
.form-row{display:flex;gap:10px}
.form-row .form-group{flex:1}
.upload-box{border:2px dashed #ddd;border-radius:8px;padding:16px;text-align:center;cursor:pointer;background:#fafafa}
.upload-box:hover{border-color:#e54d00}
.upload-placeholder{display:flex;flex-direction:column;align-items:center;font-size:24px;color:#999}
.upload-placeholder span{font-size:12px;margin-top:4px}
.upload-box img{max-width:100%;max-height:80px;border-radius:8px}
.btns{display:flex;gap:10px;margin-top:16px}
.btns button{flex:1;padding:12px;border:none;border-radius:8px;font-size:14px;cursor:pointer}
.save-btn{background:#e54d00;color:#fff}
.cancel-btn{background:#f5f5f5;color:#666}
.delete-btn-form{background:#fff;color:#ff4d4f;border:1px solid #ff4d4f;display:none}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 24px;border-radius:8px;font-size:14px;z-index:9999;opacity:0;transition:opacity .3s}
.toast.show{opacity:1}
.kf-info{background:#fff;border-radius:12px;padding:16px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between}
.kf-label{font-size:14px;color:#666}
.kf-value{font-size:16px;font-weight:600;color:#e54d00}
</style>
</head>
<body>

<div class="header">
  <h1>🛠️ 商品管理</h1>
  <a href="user.html" target="_blank">👁 查看用户端</a>
</div>

<div class="main">
  <div class="kf-info">
    <span class="kf-label">客服微信：</span>
    <span class="kf-value" id="kfDisplay">未设置</span>
    <button class="btn-kf" onclick="openKf()" style="margin-left:12px;">设置</button>
  </div>
  
  <div class="toolbar">
    <input type="text" placeholder="搜索商品..." oninput="render()">
    <button class="btn-sync" onclick="sync()">☁️ 同步</button>
    <button class="btn-add" onclick="openAdd()">+ 添加</button>
  </div>
  
  <div class="products" id="products"></div>
  <div class="empty" id="empty" style="display:none;">暂无商品，点击上方按钮添加</div>
</div>

<!-- 添加/编辑弹窗 -->
<div class="modal" id="modal">
  <div class="form-box">
    <h2 id="formTitle">添加商品</h2>
    
    <div class="form-group"><label>商品名称</label><input type="text" id="title" placeholder="例：考研数学复习全书"></div>
    
    <div class="form-row">
      <div class="form-group"><label>价格（元）</label><input type="number" id="price" placeholder="29.9" step="0.1"></div>
      <div class="form-group"><label>销量</label><input type="number" id="sales" placeholder="0"></div>
    </div>
    
    <div class="form-group">
      <label>商品封面</label>
      <div class="upload-box" onclick="document.getElementById('coverInput').click()">
        <img id="coverPreview" style="display:none;">
        <div class="upload-placeholder" id="coverPlaceholder"><span>🖼️</span><span>点击上传封面</span></div>
      </div>
      <input type="file" id="coverInput" accept="image/*" style="display:none;" onchange="handleCover(this)">
      <input type="hidden" id="img">
    </div>
    
    <div class="form-group"><label>商品描述</label><textarea id="desc" placeholder="描述商品特点..."></textarea></div>
    
    <div class="form-row">
      <div class="form-group">
        <label>微信收款码</label>
        <div class="upload-box" onclick="document.getElementById('wechatInput').click()">
          <img id="wechatPreview" style="display:none;">
          <div class="upload-placeholder" id="wechatPlaceholder"><span>💚</span><span>上传微信码</span></div>
        </div>
        <input type="file" id="wechatInput" accept="image/*" style="display:none;" onchange="handleImg(this,'wechatPay')">
        <input type="hidden" id="wechatPay">
      </div>
      <div class="form-group">
        <label>支付宝收款码</label>
        <div class="upload-box" onclick="document.getElementById('alipayInput').click()">
          <img id="alipayPreview" style="display:none;">
          <div class="upload-placeholder" id="alipayPlaceholder"><span>💙</span><span>上传支付宝码</span></div>
        </div>
        <input type="file" id="alipayInput" accept="image/*" style="display:none;" onchange="handleImg(this,'alipay')">
        <input type="hidden" id="alipay">
      </div>
    </div>
    
    <div class="form-group"><label>发货资料链接</label><input type="text" id="fileUrl" placeholder="购买后发送的资料链接"></div>
    
    <div class="btns">
      <button class="delete-btn-form" id="delBtn" onclick="del()">删除</button>
      <button class="cancel-btn" onclick="closeModal()">取消</button>
      <button class="save-btn" onclick="save()">保存</button>
    </div>
  </div>
</div>

<!-- 客服微信弹窗 -->
<div class="modal" id="kfModal">
  <div class="form-box">
    <h2>设置客服微信</h2>
    <div class="form-group"><label>客服微信号</label><input type="text" id="kfInput" placeholder="请输入微信号"></div>
    <div class="btns">
      <button class="cancel-btn" onclick="closeKf()">取消</button>
      <button class="save-btn" onclick="saveKf()">保存</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const DATA_URL='https://raw.githubusercontent.com/kaede123456/digital-store/main/data.json';
let products=[];
let editingId=null;

// 初始化
function init(){
  products=JSON.parse(localStorage.getItem('products'))||[];
  render();
  document.getElementById('kfDisplay').textContent=localStorage.getItem('kfWechat')||'未设置';
}

// 渲染列表
function render(){
  const search=document.querySelector('input').value.toLowerCase();
  const filtered=products.filter(p=>p.title.toLowerCase().includes(search));
  const el=document.getElementById('products');
  const empty=document.getElementById('empty');
  
  if(filtered.length===0){el.style.display='none';empty.style.display='block';return;}
  el.style.display='flex';empty.style.display='none';
  
  el.innerHTML=filtered.map(p=>`
    <div class="product" onclick="openEdit(${p.id})">
      <div class="product-img">${p.img&&(p.img.startsWith('data:')||p.img.startsWith('http'))?'<img src="'+p.img+'" style="width:100%;height:100%;object-fit:cover;border-radius:8px;">':(p.img||'📄')}</div>
      <div class="product-info">
        <div class="product-title">${p.title}</div>
        <div class="product-desc">${p.desc||''}</div>
        <div class="product-bottom">
          <span class="product-price">¥${p.price}</span>
          <span class="product-sales">${p.sales||0}人购</span>
        </div>
      </div>
    </div>
  `).join('');
}

// 打开添加
function openAdd(){
  editingId=null;
  document.getElementById('formTitle').textContent='添加商品';
  document.getElementById('title').value='';
  document.getElementById('price').value='';
  document.getElementById('sales').value='0';
  document.getElementById('desc').value='';
  document.getElementById('fileUrl').value='';
  document.getElementById('img').value='';
  document.getElementById('wechatPay').value='';
  document.getElementById('alipay').value='';
  clearPreviews();
  document.getElementById('delBtn').style.display='none';
  document.getElementById('modal').classList.add('show');
}

// 打开编辑
function openEdit(id){
  const p=products.find(x=>x.id===id);
  if(!p)return;
  editingId=id;
  document.getElementById('formTitle').textContent='编辑商品';
  document.getElementById('title').value=p.title||'';
  document.getElementById('price').value=p.price||'';
  document.getElementById('sales').value=p.sales||0;
  document.getElementById('desc').value=p.desc||'';
  document.getElementById('fileUrl').value=p.fileUrl||'';
  document.getElementById('img').value=p.img||'';
  document.getElementById('wechatPay').value=p.wechatPay||'';
  document.getElementById('alipay').value=p.alipay||'';
  
  // 显示预览
  if(p.img&&(p.img.startsWith('data:')||p.img.startsWith('http'))){
    document.getElementById('coverPreview').src=p.img;
    document.getElementById('coverPreview').style.display='block';
    document.getElementById('coverPlaceholder').style.display='none';
  }
  if(p.wechatPay){
    document.getElementById('wechatPreview').src=p.wechatPay;
    document.getElementById('wechatPreview').style.display='block';
    document.getElementById('wechatPlaceholder').style.display='none';
  }
  if(p.alipay){
    document.getElementById('alipayPreview').src=p.alipay;
    document.getElementById('alipayPreview').style.display='block';
    document.getElementById('alipayPlaceholder').style.display='none';
  }
  
  document.getElementById('delBtn').style.display='block';
  document.getElementById('modal').classList.add('show');
}

function closeModal(){document.getElementById('modal').classList.remove('show');}
function clearPreviews(){
  ['coverPreview','wechatPreview','alipayPreview'].forEach(id=>{
    document.getElementById(id).style.display='none';
  });
  ['coverPlaceholder','wechatPlaceholder','alipayPlaceholder'].forEach(id=>{
    document.getElementById(id).style.display='flex';
  });
}

function handleCover(input){
  const file=input.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    document.getElementById('img').value=e.target.result;
    document.getElementById('coverPreview').src=e.target.result;
    document.getElementById('coverPreview').style.display='block';
    document.getElementById('coverPlaceholder').style.display='none';
  };
  reader.readAsDataURL(file);
}

function handleImg(input,type){
  const file=input.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    if(type==='wechatPay'){
      document.getElementById('wechatPay').value=e.target.result;
      document.getElementById('wechatPreview').src=e.target.result;
      document.getElementById('wechatPreview').style.display='block';
      document.getElementById('wechatPlaceholder').style.display='none';
    }else{
      document.getElementById('alipay').value=e.target.result;
      document.getElementById('alipayPreview').src=e.target.result;
      document.getElementById('alipayPreview').style.display='block';
      document.getElementById('alipayPlaceholder').style.display='none';
    }
  };
  reader.readAsDataURL(file);
}

function save(){
  const title=document.getElementById('title').value.trim();
  const price=parseFloat(document.getElementById('price').value);
  const sales=parseInt(document.getElementById('sales').value)||0;
  const img=document.getElementById('img').value||'📄';
  const desc=document.getElementById('desc').value.trim();
  const fileUrl=document.getElementById('fileUrl').value.trim();
  const wechatPay=document.getElementById('wechatPay').value;
  const alipay=document.getElementById('alipay').value;
  
  if(!title||isNaN(price)){toast('请填写名称和价格');return;}
  
  if(editingId){
    const p=products.find(x=>x.id===editingId);
    if(p)Object.assign(p,{title,price,sales,img,desc,fileUrl,wechatPay,alipay});
    toast('已更新');
  }else{
    products.push({id:Date.now(),title,price,sales,img,desc,fileUrl,wechatPay,alipay});
    toast('已添加');
  }
  
  localStorage.setItem('products',JSON.stringify(products));
  closeModal();
  render();
}

function del(){
  if(!editingId)return;
  if(!confirm('确定删除？'))return;
  products=products.filter(x=>x.id!==editingId);
  localStorage.setItem('products',JSON.stringify(products));
  closeModal();
  render();
  toast('已删除');
}

// 客服微信
function openKf(){
  document.getElementById('kfInput').value=localStorage.getItem('kfWechat')||'';
  document.getElementById('kfModal').classList.add('show');
}
function closeKf(){document.getElementById('kfModal').classList.remove('show');}
function saveKf(){
  const wechat=document.getElementById('kfInput').value.trim();
  localStorage.setItem('kfWechat',wechat);
  document.getElementById('kfDisplay').textContent=wechat||'未设置';
  closeKf();
  toast('已保存');
}

// 同步到云端
async function sync(){
  const token=localStorage.getItem('githubToken');
  if(!token){
    const t=prompt('请输入GitHub Token：\n\n获取方式：\n1. https://github.com/settings/tokens\n2. Generate new token (classic)\n3. 勾选repo权限\n4. 复制token粘贴');
    if(t&&t.trim()){localStorage.setItem('githubToken',t.trim());toast('Token已保存');}else{toast('需要Token才能同步');}
    return;
  }
  
  toast('同步中...');
  const data={products,kfWechat:localStorage.getItem('kfWechat')||'',updatedAt:new Date().toISOString()};
  
  try{
    let sha=null;
    try{
      const r=await fetch('https://api.github.com/repos/kaede123456/digital-store/contents/data.json',{headers:{Authorization:'token '+token}});
      if(r.ok)sha=(await r.json()).sha;
    }catch(e){}
    
    const body={message:'Sync',content:btoa(unescape(encodeURIComponent(JSON.stringify(data))))};
    if(sha)body.sha=sha;
    
    const r=await fetch('https://api.github.com/repos/kaede123456/digital-store/contents/data.json',{
      method:'PUT',headers:{Authorization:'token '+token,ContentType:'application/json'},body:JSON.stringify(body)
    });
    
    toast(r.ok?'同步成功':'同步失败');
  }catch(e){toast('同步失败');}
}

function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}

document.getElementById('modal').addEventListener('click',e=>{if(e.target.id==='modal')closeModal();});
document.getElementById('kfModal').addEventListener('click',e=>{if(e.target.id==='kfModal')closeKf();});

init();
</script>
</body>
</html>
