<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>商品管理</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif;
  background: #f5f5f5;
  color: #1a1a1a;
  min-height: 100vh;
  padding-bottom: 20px;
  -webkit-font-smoothing: antialiased;
}
.header {
  background: #e54d00;
  color: #fff;
  padding: 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.header h1 { font-size: 18px; font-weight: 600; }
.header a { color: #fff; text-decoration: none; font-size: 13px; background: rgba(255,255,255,0.2); padding: 6px 12px; border-radius: 6px; }
.add-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  margin: 16px;
  padding: 14px;
  background: #fff;
  border: 2px dashed #e54d00;
  border-radius: 10px;
  color: #e54d00;
  font-size: 15px;
  font-weight: 500;
  cursor: pointer;
}
.products {
  padding: 0 16px;
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
}
.product {
  background: #fff;
  border-radius: 10px;
  overflow: hidden;
  cursor: pointer;
}
.product:active { opacity: 0.8; }
.product-img {
  width: 100%;
  aspect-ratio: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 40px;
  background: #fafafa;
}
.product-info { padding: 10px; }
.product-title {
  font-size: 13px;
  font-weight: 500;
  line-height: 1.4;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  margin-bottom: 6px;
  min-height: 36px;
}
.product-price { font-size: 15px; font-weight: 600; color: #e54d00; }
.product-sales { font-size: 11px; color: #bbb; margin-top: 4px; }
.empty {
  text-align: center;
  padding: 60px;
  color: #999;
  grid-column: 1/-1;
}
.empty-icon { font-size: 50px; margin-bottom: 12px; }

/* 弹窗 */
.modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  display: none;
  align-items: flex-end;
  z-index: 300;
}
.modal.show { display: flex; }
.form-box {
  background: #fff;
  width: 100%;
  max-height: 90vh;
  border-radius: 16px 16px 0 0;
  padding: 24px 20px;
  overflow-y: auto;
}
.form-title {
  text-align: center;
  font-size: 17px;
  font-weight: 600;
  margin-bottom: 20px;
}
.form-group { margin-bottom: 16px; }
.form-group label {
  display: block;
  font-size: 13px;
  color: #888;
  margin-bottom: 6px;
}
.form-group input,
.form-group textarea {
  width: 100%;
  padding: 12px;
  border: 1px solid #eee;
  border-radius: 8px;
  font-size: 14px;
  outline: none;
  font-family: inherit;
}
.form-group textarea { resize: none; height: 80px; }
.form-row { display: flex; gap: 12px; }
.form-row .form-group { flex: 1; }
.form-btns {
  display: flex;
  gap: 10px;
  margin-top: 20px;
}
.form-btns button {
  flex: 1;
  padding: 14px;
  border-radius: 8px;
  font-size: 15px;
  font-weight: 500;
  cursor: pointer;
  border: none;
}
.btn-save { background: #e54d00; color: #fff; }
.btn-del { background: #fff; color: #e54d00; border: 1px solid #e54d00; display: none; }
.btn-cancel { background: #f5f5f5; color: #666; }
.toast {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: rgba(0,0,0,0.7);
  color: #fff;
  padding: 12px 24px;
  border-radius: 8px;
  font-size: 14px;
  z-index: 9999;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s;
}
.toast.show { opacity: 1; }
</style>
</head>
<body>

<div class="header">
  <h1>🛠️ 商品管理</h1>
  <a href="user.html" target="_blank">👁 查看用户端</a>
</div>

<button class="add-btn" onclick="openForm()">+ 添加商品</button>

<div class="products" id="grid"></div>
<div class="empty" id="empty" style="display:none;">
  <div class="empty-icon">📦</div>
  <div>暂无商品</div>
</div>

<!-- 编辑弹窗 -->
<div class="modal" id="modal">
  <div class="form-box">
    <div class="form-title" id="formTitle">添加商品</div>
    <div class="form-group">
      <label>商品名称</label>
      <input type="text" id="pTitle" placeholder="例：2026考研数学复习全书">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>价格（元）</label>
        <input type="number" id="pPrice" placeholder="29.9" step="0.1">
      </div>
      <div class="form-group">
        <label>销量</label>
        <input type="number" id="pSales" placeholder="0">
      </div>
    </div>
    <div class="form-group">
      <label>图标（emoji）</label>
      <input type="text" id="pImg" placeholder="📐">
    </div>
    <div class="form-group">
      <label>发货图片URL</label>
      <input type="text" id="pFileUrl" placeholder="购买后发送的图片链接">
    </div>
    <div class="form-group">
      <label>商品描述</label>
      <textarea id="pDesc" placeholder="描述商品特点..."></textarea>
    </div>
    <div class="form-btns">
      <button class="btn-del" id="delBtn" onclick="deleteProduct()">删除</button>
      <button class="btn-cancel" onclick="closeForm()">取消</button>
      <button class="btn-save" onclick="saveProduct()">保存</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const defaults = [
  { id: 1, title: '2026考研数学复习全书', price: 29.9, sales: 1523, img: '📐', desc: '包含高数、线代、概率论全部内容，配套视频讲解', fileUrl: '' },
  { id: 2, title: '考研英语词汇5500', price: 9.9, sales: 2341, img: '📖', desc: '考研英语大纲词汇，附带真题例句和记忆技巧', fileUrl: '' },
  { id: 3, title: '考研政治核心考点', price: 19.9, sales: 1892, img: '📕', desc: '马原、毛概、史纲、思修核心知识点总结', fileUrl: '' },
  { id: 4, title: '考研数学历年真题', price: 39.9, sales: 892, img: '📝', desc: '近20年考研数学真题及详细解析', fileUrl: '' },
  { id: 5, title: '考研英语真题精解', price: 35.9, sales: 1023, img: '📋', desc: '近15年英语真题逐句精解', fileUrl: '' },
  { id: 6, title: '计算机408专业课', price: 49.9, sales: 567, img: '💻', desc: '数据结构、操作系统、计网、组成原理全套', fileUrl: '' },
];

let products = JSON.parse(localStorage.getItem('products')) || defaults;
let editingId = null;

function render() {
  const grid = document.getElementById('grid');
  const empty = document.getElementById('empty');
  if (products.length === 0) {
    grid.style.display = 'none';
    empty.style.display = 'block';
    return;
  }
  grid.style.display = 'grid';
  empty.style.display = 'none';
  grid.innerHTML = products.map(p => `
    <div class="product" onclick="openForm(${p.id})">
      <div class="product-img">${p.img}</div>
      <div class="product-info">
        <div class="product-title">${p.title}</div>
        <div class="product-price">¥${p.price}</div>
        <div class="product-sales">${p.sales}人购</div>
      </div>
    </div>
  `).join('');
}

function openForm(id) {
  editingId = id;
  const modal = document.getElementById('modal');
  const title = document.getElementById('formTitle');
  const delBtn = document.getElementById('delBtn');
  if (id) {
    const p = products.find(x => x.id === id);
    if (!p) return;
    title.textContent = '编辑商品';
    document.getElementById('pTitle').value = p.title;
    document.getElementById('pPrice').value = p.price;
    document.getElementById('pSales').value = p.sales;
    document.getElementById('pImg').value = p.img;
    document.getElementById('pFileUrl').value = p.fileUrl || '';
    document.getElementById('pDesc').value = p.desc;
    delBtn.style.display = 'block';
  } else {
    title.textContent = '添加商品';
    document.getElementById('pTitle').value = '';
    document.getElementById('pPrice').value = '';
    document.getElementById('pSales').value = '0';
    document.getElementById('pImg').value = '📄';
    document.getElementById('pFileUrl').value = '';
    document.getElementById('pDesc').value = '';
    delBtn.style.display = 'none';
  }
  modal.classList.add('show');
}

function closeForm() {
  document.getElementById('modal').classList.remove('show');
  editingId = null;
}

function saveProduct() {
  const title = document.getElementById('pTitle').value.trim();
  const price = parseFloat(document.getElementById('pPrice').value);
  const sales = parseInt(document.getElementById('pSales').value) || 0;
  const img = document.getElementById('pImg').value.trim() || '📄';
  const fileUrl = document.getElementById('pFileUrl').value.trim();
  const desc = document.getElementById('pDesc').value.trim();
  if (!title || isNaN(price)) { showToast('请填写名称和价格'); return; }
  if (editingId) {
    const p = products.find(x => x.id === editingId);
    if (p) { p.title = title; p.price = price; p.sales = sales; p.img = img; p.fileUrl = fileUrl; p.desc = desc; }
    showToast('已更新');
  } else {
    products.push({ id: Date.now(), title, price, sales, img, fileUrl, desc });
    showToast('已添加');
  }
  localStorage.setItem('products', JSON.stringify(products));
  closeForm();
  render();
}

function deleteProduct() {
  if (!editingId) return;
  if (!confirm('确定删除？')) return;
  products = products.filter(x => x.id !== editingId);
  localStorage.setItem('products', JSON.stringify(products));
  closeForm();
  render();
  showToast('已删除');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

document.getElementById('modal').addEventListener('click', e => {
  if (e.target === document.getElementById('modal')) closeForm();
});

render();
</script>
</body>
</html>
